<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manifesto por Transportadora</title>

    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.3/dist/jspdf.plugin.autotable.min.js"></script>
  </head>

  <body>
    <main class="container">
      <header class="page-header">
        <h1>Manifesto por transportadora</h1>
        <p class="muted">
          Informe o intervalo de remessas/arquivos. O sistema vai analisar e te
          mostrar as transportadoras encontradas para você escolher quais gerar.
        </p>
      </header>

      <section class="card">
        <div class="grid">
          <div class="field">
            <label for="inicio">Início</label>
            <input
              id="inicio"
              class="form-control"
              inputmode="numeric"
              placeholder="ex: 11305"
            />
          </div>
          <div class="field">
            <label for="fim">Fim</label>
            <input
              id="fim"
              class="form-control"
              inputmode="numeric"
              placeholder="ex: 11330"
            />
          </div>

          <div class="actions">
            <button id="btnAnalisar" class="btn btn-primary">
              Analisar intervalo
            </button>
            <button id="btnLimpar" class="btn btn-ghost">Limpar</button>
          </div>
        </div>

        <div class="progress-wrap" aria-hidden="true">
          <div class="progress">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
          </div>
          <div id="status" class="muted small">Pronto.</div>
        </div>
      </section>

      <section class="card" id="previewCard" style="display: none">
        <div class="card-header">
          <h2>Selecione o que gerar</h2>
          <div class="row">
            <button id="btnMarcarTudo" class="btn btn-ghost btn-sm">
              Marcar tudo
            </button>
            <button id="btnDesmarcarTudo" class="btn btn-ghost btn-sm">
              Desmarcar
            </button>
            <button id="btnGerarSelecionados" class="btn btn-primary btn-sm">
              Gerar PDFs selecionados
            </button>
          </div>
        </div>

        <div id="previewList" class="list"></div>
      </section>

      <section class="card">
        <h2>Log</h2>
        <pre id="log" class="log"></pre>
      </section>
    </main>

    <script type="module" src="./modules/manifesto.ui.js"></script>
  </body>
</html>
