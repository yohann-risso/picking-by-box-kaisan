<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manifesto por Transportadora</title>

    <link rel="icon" type="image/png" href="/img/logo_picking_by_box.png" />
    <link rel="stylesheet" href="./css/style.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.3/dist/jspdf.plugin.autotable.min.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/manifesto.css" />
  </head>

  <body>
    <div class="manifesto-container">
      <!-- Header padrão do app -->
      <div class="header-container manifesto-header">
        <img
          class="app-logo"
          src="https://www.kaisan.com.br/skin/frontend/ultimo/default/images/nova/logo-2020-new.png"
          alt="Kaisan"
        />
        <h1 class="app-title">Manifesto por transportadora</h1>
      </div>

      <!-- Card: intervalo -->
      <section class="manifesto-card">
        <div class="manifesto-grid">
          <div>
            <label class="manifesto-label" for="inicio"
              >Remessa/Arquivo início</label
            >
            <input id="inicio" class="manifesto-input" inputmode="numeric" />
          </div>

          <div>
            <label class="manifesto-label" for="fim">Remessa/Arquivo fim</label>
            <input id="fim" class="manifesto-input" inputmode="numeric" />
          </div>

          <div class="manifesto-actions">
            <button id="btnAnalisar" class="btn btn-primary">Analisar</button>
            <button id="btnLimpar" class="btn btn-outline-secondary">
              Limpar
            </button>
          </div>
        </div>

        <div class="manifesto-progress-wrap">
          <div class="progress progress-container" style="height: 14px">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
          </div>
          <div id="status" class="manifesto-status">Pronto.</div>
        </div>
      </section>

      <!-- Card: preview -->
      <section class="manifesto-card" id="previewCard" style="display: none">
        <div class="preview-header">
          <div>
            <div style="font-weight: 800; font-size: 1.1rem">
              Selecione o que gerar
            </div>
            <div class="muted">Marque as transportadoras desejadas.</div>
          </div>

          <div class="preview-actions">
            <button id="btnMarcarTudo" class="btn btn-outline-secondary">
              Marcar tudo
            </button>
            <button id="btnDesmarcarTudo" class="btn btn-outline-secondary">
              Desmarcar
            </button>
            <button id="btnGerarSelecionados" class="btn btn-success">
              Gerar PDFs
            </button>
          </div>
        </div>

        <div
          class="manifesto-preview-list historico-container"
          style="margin-top: 12px"
        >
          <div id="previewList"></div>
        </div>
      </section>

      <!-- Card: log -->
      <section class="manifesto-card">
        <div style="font-weight: 800; margin-bottom: 8px">Log</div>
        <div class="manifesto-log-box">
          <pre id="log"></pre>
        </div>
      </section>
    </div>

    <script type="module" src="./modules/manifesto.ui.js"></script>
  </body>
</html>
