<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manifesto por Transportadora</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.3/dist/jspdf.plugin.autotable.min.js"></script>

    <style>
      body {
        background: #0b0f14;
        color: #e9eef5;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
      }
      .muted {
        color: #9ca3af;
      }
      code {
        color: #93c5fd;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      textarea {
        min-height: 90px;
      }
    </style>
  </head>

  <body class="p-4">
    <div class="container" style="max-width: 980px">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h3 class="m-0">Manifesto final por transportadora</h3>
        <a class="btn btn-outline-light btn-sm" href="./index.html">Voltar</a>
      </div>

      <div class="card p-3 mb-3">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Remessa/Arquivo início</label>
            <input
              id="inicio"
              class="form-control mono"
              placeholder="ex: 16479 (ou 11305)"
            />
            <div class="form-text muted">
              Se você usa <code>ctr_cod_arquivo_remessa</code>, informe o ID
              daqui.
            </div>
          </div>

          <div class="col-md-3">
            <label class="form-label">Remessa/Arquivo fim</label>
            <input
              id="fim"
              class="form-control mono"
              placeholder="ex: 16492 (ou 11330)"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label"
              >Cookie do GE (opcional, se exigir login)</label
            >
            <textarea
              id="cookie"
              class="form-control mono"
              placeholder="ex: PHPSESSID=...; other=..."
            ></textarea>
            <div class="form-text muted">
              O proxy no Vercel usa isso só em memória para buscar as páginas.
            </div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button id="btnGerar" class="btn btn-primary">
              Gerar manifestos
            </button>
            <button id="btnLimpar" class="btn btn-outline-light">Limpar</button>
          </div>
        </div>
      </div>

      <div class="card p-3">
        <div class="d-flex align-items-center justify-content-between">
          <div>
            <div class="fw-semibold">Log</div>
            <div class="muted small">Progresso e erros de parsing / fetch.</div>
          </div>
          <div class="muted small mono" id="status">Pronto.</div>
          <div class="mt-2">
            <div
              class="progress"
              style="
                height: 10px;
                background: #0b1220;
                border: 1px solid #1f2937;
              "
            >
              <div
                id="progressBar"
                class="progress-bar"
                style="width: 0%"
              ></div>
            </div>
          </div>
        </div>

        <div class="mt-3">
          <pre
            id="log"
            class="mono p-3"
            style="
              background: #0b1220;
              border-radius: 12px;
              max-height: 420px;
              overflow: auto;
            "
          ></pre>
        </div>
      </div>
    </div>

    <script type="module" src="./modules/manifesto.ui.js"></script>
  </body>
</html>
